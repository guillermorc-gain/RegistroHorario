      - name: Generate notification sound files
        run: |
          python3 << 'PYEOF'
          import wave, struct, math, os
          def gen_wav(path, segments, sr=44100):
              frames = []
              for seg in segments:
                  freq = seg[0]; dur = seg[1]
                  mode = seg[2] if len(seg) > 2 else 'tone'
                  freq_end = seg[3] if len(seg) > 3 else freq
                  n = int(sr * dur); phase = 0.0
                  for i in range(n):
                      t = i / sr
                      if freq == 0:
                          frames.append(struct.pack('<h', 0)); continue
                      att = min(1.0, t / 0.012)
                      if mode == 'bell':
                          env = att * math.exp(-t * 4.0 / dur)
                          f = freq
                      elif mode == 'sweep':
                          env = att * min(1.0, (dur - t) / 0.10)
                          f = freq + (freq_end - freq) * t / dur
                      else:
                          env = att * min(1.0, (dur - t) / max(dur * 0.15, 0.05))
                          f = freq
                      phase += 2 * math.pi * f / sr
                      frames.append(struct.pack('<h', int(32767 * 0.65 * env * math.sin(phase))))
              with wave.open(path, 'w') as f:
                  f.setnchannels(1); f.setsampwidth(2); f.setframerate(sr)
                  f.writeframes(b''.join(frames))
          os.makedirs('android/app/src/main/res/raw', exist_ok=True)
          R = 'android/app/src/main/res/raw/'
          gen_wav(R+'notif_ding.wav',    [(880, 1.0, 'bell')])
          gen_wav(R+'notif_campana.wav', [(660, 0.5, 'bell'), (880, 0.75, 'bell')])
          gen_wav(R+'notif_alerta.wav',  [(440, 0.20), (0, 0.05), (660, 0.20), (0, 0.05), (880, 0.30)])
          gen_wav(R+'notif_silbido.wav', [(800, 0.42, 'sweep', 1400), (1400, 0.38, 'sweep', 800)])
          gen_wav(R+'notif_doble.wav',   [(880, 0.30), (0, 0.12), (880, 0.30)])
          gen_wav(R+'notif_fanfare.wav', [(440, 0.20), (550, 0.20), (660, 0.20), (880, 0.60, 'bell')])
          gen_wav(R+'notif_suave.wav',   [(330, 1.2, 'bell')])
          print("Sound files OK")
          PYEOF

      - name: Set Android launcher icon
        run: |
          pip install Pillow -q
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src_path = 'www/icons/icon-512.png'
          res_base = 'android/app/src/main/res'
          BG = (21, 101, 192)  # #1565C0

          # (legacy_size, adaptive_canvas_size)
          sizes = {
              'mipmap-mdpi':    (48,  108),
              'mipmap-hdpi':    (72,  162),
              'mipmap-xhdpi':   (96,  216),
              'mipmap-xxhdpi':  (144, 324),
              'mipmap-xxxhdpi': (192, 432),
          }

          from PIL import ImageDraw

          src_full = Image.open(src_path).convert('RGBA')
          sw, sh = src_full.size

          # The source icon has grey checkerboard pixels embedded at the corners.
          # Apply a circular mask so corners become the blue background color.
          circ_mask = Image.new('L', (sw, sh), 0)
          ImageDraw.Draw(circ_mask).ellipse([2, 2, sw-3, sh-3], fill=255)
          src_full.putalpha(circ_mask)

          for dir_name, (size, asize) in sizes.items():
              path = f'{res_base}/{dir_name}'
              os.makedirs(path, exist_ok=True)

              # Legacy icon: circular clock on solid blue, fills full square
              bg = Image.new('RGBA', (size, size), (*BG, 255))
              fg = src_full.resize((size, size), Image.LANCZOS)
              result = Image.alpha_composite(bg, fg).convert('RGB')
              result.save(f'{path}/ic_launcher.png')
              result.save(f'{path}/ic_launcher_round.png')

              # Adaptive foreground: icon at 66% of canvas, centered
              fg_sz = asize * 2 // 3
              adapt = Image.new('RGBA', (asize, asize), (*BG, 255))
              icon_fg = src_full.resize((fg_sz, fg_sz), Image.LANCZOS)
              off = (asize - fg_sz) // 2
              adapt.paste(icon_fg, (off, off), icon_fg.split()[3])
              adapt.convert('RGB').save(f'{path}/ic_launcher_foreground.png')

              Image.new('RGB', (asize, asize), BG).save(f'{path}/ic_launcher_background.png')

          print("Icons generated OK")
          PYEOF

          RES="android/app/src/main/res"
          mkdir -p "$RES/mipmap-anydpi-v26"
          cat > "$RES/mipmap-anydpi-v26/ic_launcher.xml" << 'ICONEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@mipmap/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          ICONEOF
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: horas-emt-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Horas EMT — Build ${{ github.run_number }}"
          body: "APK generado automáticamente en build #${{ github.run_number }}."
          files: android/app/build/outputs/apk/debug/app-debug.apk
          fail_on_unmatched_files: true
