name: Build APK

on:
  push:
    branches: [main, claude/pwa-install-support-dXc0v]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: npm run build:www

      - name: Add Android platform
        run: npx cap add android

      - name: Set Android launcher icon
        run: |
          sudo apt-get install -y --no-install-recommends imagemagick
          SRC="icons/icon-512.png"
          RES="android/app/src/main/res"
          for pair in "mipmap-mdpi:48" "mipmap-hdpi:72" "mipmap-xhdpi:96" "mipmap-xxhdpi:144" "mipmap-xxxhdpi:192"; do
            dir="${pair%%:*}"
            size="${pair##*:}"
            convert "$SRC" -background "#FFFFFF" -alpha remove -resize "${size}x${size}" "$RES/$dir/ic_launcher.png"
            convert "$SRC" -background "#FFFFFF" -alpha remove -resize "${size}x${size}" "$RES/$dir/ic_launcher_round.png"
          done
          rm -f "$RES/drawable/ic_launcher_foreground.xml" "$RES/drawable-v24/ic_launcher_foreground.xml"
          convert "$SRC" -resize "324x324" -gravity center -background none -extent "432x432" "$RES/drawable/ic_launcher_foreground.png"
          find "$RES/values" -name "*.xml" -exec grep -l "ic_launcher_background" {} \; | \
            xargs sed -i 's|<color name="ic_launcher_background">[^<]*|<color name="ic_launcher_background">#FFFFFF|'

      - name: Patch variables.gradle — targetSdkVersion 34
        run: |
          VARS="android/variables.gradle"
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 34/' "$VARS"
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' "$VARS"

      - name: Patch AndroidManifest — permissions + intent filter localhost
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />|' "$MANIFEST"
          sed -i 's|</activity>|        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="https" android:host="localhost" />\n        </intent-filter>\n    </activity>|' "$MANIFEST"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: horas-emt-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
