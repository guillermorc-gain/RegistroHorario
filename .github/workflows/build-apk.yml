name: Build APK

on:
  push:
    branches: [main, claude/pwa-install-support-dXc0v]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build version
        run: echo "const APP_VERSION = 'build-${{ github.run_number }}';" > version.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: npm run build:www

      - name: Add Android platform
        run: npx cap add android

      - name: Patch variables.gradle — targetSdkVersion 34
        run: |
          VARS="android/variables.gradle"
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 34/' "$VARS"
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' "$VARS"

      - name: Patch AndroidManifest — permissions + intent filter localhost
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>|' "$MANIFEST"
          sed -i 's|</activity>|        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="https" android:host="localhost" />\n        </intent-filter>\n    </activity>|' "$MANIFEST"
          sed -i 's|<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />|<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />|' "$MANIFEST"
          sed -i 's|</application>|    <receiver android:name=".MainActivity$RegistrarReceiver" android:exported="false"><intent-filter><action android:name="com.guillermorc.horasemt.REGISTRAR"/></intent-filter></receiver>\n    <provider android:name="androidx.core.content.FileProvider" android:authorities="${applicationId}.fileprovider" android:exported="false" android:grantUriPermissions="true"><meta-data android:name="android.support.FILE_PROVIDER_PATHS" android:resource="@xml/file_paths"/></provider>\n    </application>|' "$MANIFEST"

      - name: Create FileProvider paths config
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml << 'XMLEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="apk_downloads" path="." />
          </paths>
          XMLEOF

      - name: Patch MainActivity — OAuth + file downloads + BroadcastReceiver
        run: |
          cat > android/app/src/main/java/com/guillermorc/horasemt/MainActivity.java << 'JAVAEOF'
          package com.guillermorc.horasemt;

          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.PendingIntent;
          import android.content.BroadcastReceiver;
          import android.content.ContentValues;
          import android.content.Context;
          import android.content.Intent;
          import android.content.SharedPreferences;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.os.Handler;
          import android.os.Looper;
          import android.provider.MediaStore;
          import android.webkit.JavascriptInterface;
          import android.widget.Toast;
          import androidx.core.app.ActivityCompat;
          import androidx.core.app.NotificationCompat;
          import androidx.core.content.FileProvider;
          import com.getcapacitor.BridgeActivity;
          import java.io.OutputStream;

          public class MainActivity extends BridgeActivity {

              public static final String PREFS      = "HorasEMT";
              public static final String CHANNEL_ID = "trabajo_cercano";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  createNotificationChannel();
                  requestNotificationPermission();
                  handleOAuthIntent(getIntent());
                  setupJavascriptInterface();
              }

              private void requestNotificationPermission() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      if (ActivityCompat.checkSelfPermission(this, android.Manifest.permission.POST_NOTIFICATIONS)
                              != android.content.pm.PackageManager.PERMISSION_GRANTED) {
                          ActivityCompat.requestPermissions(this,
                              new String[]{ android.Manifest.permission.POST_NOTIFICATIONS }, 1);
                      }
                  }
              }

              @Override
              protected void onNewIntent(Intent intent) {
                  super.onNewIntent(intent);
                  setIntent(intent);
                  handleOAuthIntent(intent);
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel ch = new NotificationChannel(
                          CHANNEL_ID, "Trabajo cercano", NotificationManager.IMPORTANCE_HIGH);
                      ((NotificationManager) getSystemService(Context.NOTIFICATION_SERVICE))
                          .createNotificationChannel(ch);
                  }
              }

              private void handleOAuthIntent(Intent intent) {
                  if (intent == null || getBridge() == null) return;
                  Uri data = intent.getData();
                  if (data == null) return;
                  String token = data.getQueryParameter("access_token");
                  if (token == null || token.isEmpty()) return;
                  String exp = data.getQueryParameter("expires_in");
                  String url = "https://localhost/?access_token=" + Uri.encode(token)
                      + (exp != null ? "&expires_in=" + exp : "");
                  getBridge().getWebView().post(() -> getBridge().getWebView().loadUrl(url));
              }

              private void setupJavascriptInterface() {
                  if (getBridge() == null || getBridge().getWebView() == null) return;
                  final Context ctx = this;
                  getBridge().getWebView().addJavascriptInterface(new Object() {

                      @JavascriptInterface
                      public void saveToPrefs(String key, String value) {
                          ctx.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                              .edit().putString(key, value).apply();
                      }

                      @JavascriptInterface
                      public void scheduleWorkNotification(String horaInicio, String horaFin) {
                          SharedPreferences prefs = ctx.getSharedPreferences(PREFS, Context.MODE_PRIVATE);
                          String today = new java.text.SimpleDateFormat("yyyyMMdd", java.util.Locale.US).format(new java.util.Date());
                          if (today.equals(prefs.getString("lastRegisteredDate", ""))) return;
                          prefs.edit()
                              .putString("lastHoraInicio", horaInicio)
                              .putString("lastHoraFin", horaFin).apply();
                          NotificationManager nm = (NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE);
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              nm.createNotificationChannel(new NotificationChannel(
                                  CHANNEL_ID, "Trabajo cercano", NotificationManager.IMPORTANCE_HIGH));
                          }
                          int flags = PendingIntent.FLAG_UPDATE_CURRENT
                              | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0);
                          Intent bi = new Intent("com.guillermorc.horasemt.REGISTRAR");
                          bi.setPackage("com.guillermorc.horasemt");
                          PendingIntent broadcastPI = PendingIntent.getBroadcast(ctx, 0, bi, flags);
                          Intent oi = new Intent(ctx, MainActivity.class);
                          oi.addFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP);
                          PendingIntent openPI = PendingIntent.getActivity(ctx, 1, oi, flags);
                          nm.notify(1001, new NotificationCompat.Builder(ctx, CHANNEL_ID)
                              .setSmallIcon(android.R.drawable.ic_menu_mylocation)
                              .setContentTitle("📍 Horas EMT")
                              .setContentText("Parece que estás en el trabajo. ¿Registras la jornada?")
                              .setPriority(NotificationCompat.PRIORITY_HIGH)
                              .setContentIntent(openPI)
                              .setAutoCancel(false)
                              .addAction(0, "✅ Registrar jornada", broadcastPI)
                              .addAction(0, "🕐 Otro horario", openPI)
                              .build());
                      }

                      @JavascriptInterface
                      public void cancelWorkNotification() {
                          ((NotificationManager) ctx.getSystemService(Context.NOTIFICATION_SERVICE)).cancel(1001);
                      }

                      @JavascriptInterface
                      public void saveFile(String content, String filename) {
                          final String fname = (filename != null && !filename.isEmpty())
                              ? filename : "horas-emt.json";
                          byte[] bytes;
                          try { bytes = content.getBytes("UTF-8"); }
                          catch (Exception e) { bytes = content.getBytes(); }
                          final byte[] data = bytes;
                          try {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                                  ContentValues v = new ContentValues();
                                  v.put(MediaStore.Downloads.DISPLAY_NAME, fname);
                                  v.put(MediaStore.Downloads.MIME_TYPE, "application/json");
                                  Uri uri = ctx.getContentResolver().insert(
                                      MediaStore.Downloads.EXTERNAL_CONTENT_URI, v);
                                  if (uri == null) return;
                                  try (OutputStream os = ctx.getContentResolver().openOutputStream(uri)) {
                                      if (os != null) os.write(data);
                                  }
                              } else {
                                  java.io.File f = new java.io.File(
                                      Environment.getExternalStoragePublicDirectory(
                                          Environment.DIRECTORY_DOWNLOADS), fname);
                                  try (java.io.FileOutputStream fos = new java.io.FileOutputStream(f)) {
                                      fos.write(data);
                                  }
                                  android.media.MediaScannerConnection.scanFile(
                                      ctx, new String[]{f.getAbsolutePath()}, null, null);
                              }
                              new Handler(Looper.getMainLooper()).post(() ->
                                  Toast.makeText(ctx, "Guardado en Descargas: " + fname, Toast.LENGTH_LONG).show());
                          } catch (Exception e) {
                              new Handler(Looper.getMainLooper()).post(() ->
                                  Toast.makeText(ctx, "Error al guardar", Toast.LENGTH_SHORT).show());
                          }
                      }
                      @JavascriptInterface
                      public String getPref(String key) {
                          return ctx.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                              .getString(key, null);
                      }

                      @JavascriptInterface
                      public void removePref(String key) {
                          ctx.getSharedPreferences(PREFS, Context.MODE_PRIVATE)
                              .edit().remove(key).apply();
                      }

                      @JavascriptInterface
                      public void openExternalUrl(String url) {
                          try {
                              Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                              intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                              ctx.startActivity(intent);
                          } catch (Exception e) {}
                      }

                      @JavascriptInterface
                      public void downloadAndInstallApk(String url) {
                          new Thread(() -> {
                              try {
                                  java.net.URL apkUrl = new java.net.URL(url);
                                  java.net.HttpURLConnection conn = (java.net.HttpURLConnection) apkUrl.openConnection();
                                  conn.setRequestProperty("User-Agent", "HorasEMT/1.0");
                                  conn.setInstanceFollowRedirects(true);
                                  conn.connect();
                                  int totalSize = conn.getContentLength();
                                  java.io.File apkFile = new java.io.File(ctx.getCacheDir(), "update.apk");
                                  try (java.io.InputStream in = conn.getInputStream();
                                       java.io.FileOutputStream out = new java.io.FileOutputStream(apkFile)) {
                                      byte[] buf = new byte[8192];
                                      int read; long downloaded = 0;
                                      while ((read = in.read(buf)) != -1) {
                                          out.write(buf, 0, read);
                                          downloaded += read;
                                          if (totalSize > 0) {
                                              final int pct = (int)(downloaded * 100L / totalSize);
                                              ((android.app.Activity) ctx).runOnUiThread(() -> {
                                                  try {
                                                      ((BridgeActivity) ctx).getBridge().getWebView()
                                                          .evaluateJavascript("app._onUpdateProgress(" + pct + ")", null);
                                                  } catch (Exception ignored) {}
                                              });
                                          }
                                      }
                                  }
                                  conn.disconnect();
                                  Uri apkUri = FileProvider.getUriForFile(ctx,
                                      ctx.getPackageName() + ".fileprovider", apkFile);
                                  Intent install = new Intent(Intent.ACTION_VIEW);
                                  install.setDataAndType(apkUri, "application/vnd.android.package-archive");
                                  install.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                                  install.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                                  ctx.startActivity(install);
                              } catch (Exception e) {
                                  ((android.app.Activity) ctx).runOnUiThread(() -> {
                                      Toast.makeText(ctx, "Error al descargar: " + e.getMessage(), Toast.LENGTH_LONG).show();
                                      try {
                                          ((BridgeActivity) ctx).getBridge().getWebView()
                                              .evaluateJavascript("app._onUpdateError()", null);
                                      } catch (Exception ignored) {}
                                  });
                              }
                          }).start();
                      }

                      @JavascriptInterface
                      public void fetchImageBase64(final String imgUrl, final String callbackFn) {
                          new Thread(() -> {
                              String result = null;
                              try {
                                  java.net.HttpURLConnection conn = (java.net.HttpURLConnection) new java.net.URL(imgUrl).openConnection();
                                  conn.setConnectTimeout(10000); conn.setReadTimeout(10000);
                                  conn.setRequestProperty("User-Agent", "Mozilla/5.0");
                                  conn.connect();
                                  java.io.InputStream is = conn.getInputStream();
                                  java.io.ByteArrayOutputStream buf = new java.io.ByteArrayOutputStream();
                                  byte[] tmp = new byte[4096]; int n;
                                  while ((n = is.read(tmp)) != -1) buf.write(tmp, 0, n);
                                  String mime = conn.getContentType() != null ? conn.getContentType().split(";")[0] : "image/jpeg";
                                  result = "data:" + mime + ";base64," + android.util.Base64.encodeToString(buf.toByteArray(), android.util.Base64.NO_WRAP);
                              } catch (Exception e) {}
                              final String r = result;
                              new android.os.Handler(android.os.Looper.getMainLooper()).post(() -> {
                                  if (getBridge() != null)
                                      getBridge().getWebView().evaluateJavascript(callbackFn + "(" + (r != null ? "'" + r + "'" : "null") + ")", null);
                              });
                          }).start();
                      }

                      @JavascriptInterface
                      public void performOAuthInWebView(final String authUrl, final boolean isSilent) {
                          ((android.app.Activity) ctx).runOnUiThread(new Runnable() {
                              @Override public void run() {
                                  final android.webkit.WebView wv = new android.webkit.WebView(ctx);
                                  wv.getSettings().setJavaScriptEnabled(true);
                                  wv.getSettings().setDomStorageEnabled(true);
                                  wv.getSettings().setUserAgentString("Mozilla/5.0 (Linux; Android 10; Mobile) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Mobile Safari/537.36");
                                  final android.app.Dialog[] dlgRef = {null};
                                  final boolean[] handled = {false};
                                  if (!isSilent) {
                                      android.app.Dialog dlg = new android.app.Dialog(ctx, android.R.style.Theme_Black_NoTitleBar_Fullscreen);
                                      android.widget.FrameLayout fl = new android.widget.FrameLayout(ctx);
                                      fl.addView(wv, new android.widget.FrameLayout.LayoutParams(-1, -1));
                                      dlg.setContentView(fl);
                                      if (dlg.getWindow() != null) dlg.getWindow().setLayout(-1, -1);
                                      dlgRef[0] = dlg;
                                  }
                                  wv.setWebViewClient(new android.webkit.WebViewClient() {
                                      private void reportResult(final String fragment) {
                                          if (handled[0]) return;
                                          handled[0] = true;
                                          if (dlgRef[0] != null) try { dlgRef[0].dismiss(); } catch (Exception e) {}
                                          ((android.app.Activity) ctx).runOnUiThread(new Runnable() {
                                              @Override public void run() {
                                                  try {
                                                      String tk = null; int exp = 3600;
                                                      if (fragment != null) {
                                                          for (String p : fragment.split("&")) {
                                                              String[] kv = p.split("=", 2);
                                                              if (kv.length < 2) continue;
                                                              if ("access_token".equals(kv[0])) { try { tk = java.net.URLDecoder.decode(kv[1], "UTF-8"); } catch (Exception e) { tk = kv[1]; } }
                                                              else if ("expires_in".equals(kv[0])) { try { exp = Integer.parseInt(kv[1]); } catch (Exception e) {} }
                                                          }
                                                      }
                                                      final String js = tk != null
                                                          ? "app._onOAuthResult('" + tk.replace("'", "\\'") + "'," + exp + ",false)"
                                                          : "app._onOAuthResult(null,0," + isSilent + ")";
                                                      ((BridgeActivity) ctx).getBridge().getWebView().evaluateJavascript(js, null);
                                                  } catch (Exception e) {}
                                              }
                                          });
                                      }
                                      @Override
                                      public boolean shouldOverrideUrlLoading(android.webkit.WebView view, android.webkit.WebResourceRequest req) {
                                          if (handled[0]) return true;
                                          String u = req.getUrl().toString();
                                          if (u.contains("registro-horario-emt.vercel.app") || u.contains("access_token=")) {
                                              String frag = req.getUrl().getFragment();
                                              String qry  = req.getUrl().getQuery();
                                              String src  = (frag != null && frag.contains("access_token=")) ? frag : (qry != null ? qry : "");
                                              reportResult(src);
                                              return true;
                                          }
                                          if (u.contains("silent_failed=1") || u.contains("error=access_denied") || u.contains("error=interaction_required")) {
                                              reportResult(null); return true;
                                          }
                                          return false;
                                      }
                                      @Override
                                      public void onPageFinished(android.webkit.WebView view, String pageUrl) {
                                          if (handled[0] || pageUrl == null || !pageUrl.contains("registro-horario-emt.vercel.app")) return;
                                          view.evaluateJavascript(
                                              "(function(){var h=(window.location.hash||'').replace(/^#/,'');var q=(window.location.search||'').replace(/^\\?/,'');return h.indexOf('access_token=')>=0?h:q;})();",
                                              new android.webkit.ValueCallback<String>() {
                                                  @Override public void onReceiveValue(String val) {
                                                      if (val != null && !val.equals("null") && val.length() > 4) {
                                                          String clean = val.startsWith("\"") ? val.substring(1, val.length()-1) : val;
                                                          reportResult(clean.contains("access_token=") ? clean : null);
                                                      } else { reportResult(null); }
                                                  }
                                              }
                                          );
                                      }
                                  });
                                  wv.loadUrl(authUrl);
                                  if (dlgRef[0] != null) dlgRef[0].show();
                              }
                          });
                      }
                  }, "AndroidBridge");
              }

              @Override
              public void onBackPressed() {
                  android.webkit.WebView wv = (getBridge() != null) ? getBridge().getWebView() : null;
                  if (wv == null) { moveTaskToBack(true); return; }
                  wv.evaluateJavascript(
                      "(function(){" +
                      "try{" +
                      "var h=document.getElementById('historialModal');" +
                      "if(h&&h.classList.contains('show')){h.classList.remove('show');return 'modal';}" +
                      "var e=document.getElementById('editModal');" +
                      "if(e&&e.classList.contains('show')){e.classList.remove('show');return 'modal';}" +
                      "var a=document.getElementById('avatarModal');" +
                      "if(a&&a.classList.contains('show')){a.classList.remove('show');return 'modal';}" +
                      "var o=document.getElementById('optionsScreen');" +
                      "if(o&&o.classList.contains('active')){app.mostrarApp();return 'main';}" +
                      "}catch(ex){}" +
                      "return 'exit';" +
                      "})()",
                      result -> {
                          if (result == null || result.contains("exit")) {
                              moveTaskToBack(true);
                          }
                      }
                  );
              }

              // Registers hours directly from notification without opening the app
              public static class RegistrarReceiver extends BroadcastReceiver {
                  @Override
                  public void onReceive(Context ctx, Intent intent) {
                      final PendingResult pr = goAsync();
                      SharedPreferences prefs = ctx.getSharedPreferences(PREFS, Context.MODE_PRIVATE);
                      final String token  = prefs.getString("accessToken", null);
                      final String fileId = prefs.getString("driveFileId", null);
                      final String inicio = prefs.getString("lastHoraInicio", null);
                      final String fin    = prefs.getString("lastHoraFin", null);
                      final Context app   = ctx.getApplicationContext();
                      if (token == null || inicio == null || fin == null || fileId == null || fileId.isEmpty()) {
                          new Handler(Looper.getMainLooper()).post(() ->
                              Toast.makeText(app, "⚠️ Abre la app para registrar", Toast.LENGTH_LONG).show());
                          pr.finish(); return;
                      }
                      new Thread(() -> {
                          try {
                              String[] p1 = inicio.split(":"), p2 = fin.split(":");
                              int min = (Integer.parseInt(p2[0])*60 + Integer.parseInt(p2[1]))
                                      - (Integer.parseInt(p1[0])*60 + Integer.parseInt(p1[1]));
                              if (min <= 0) min += 1440;
                              final double horas = Math.round(min / 6.0) / 10.0;
                              String fecha   = new java.text.SimpleDateFormat("yyyy-MM-dd", java.util.Locale.US).format(new java.util.Date());
                              String regId   = fecha.replace("-", "");
                              String fechaES = new java.text.SimpleDateFormat("dd/MM/yyyy",  java.util.Locale.US).format(new java.util.Date());
                              // GET existing Drive file
                              java.net.URL getUrl = new java.net.URL("https://www.googleapis.com/drive/v3/files/" + fileId + "?alt=media");
                              java.net.HttpURLConnection gc = (java.net.HttpURLConnection) getUrl.openConnection();
                              gc.setRequestProperty("Authorization", "Bearer " + token);
                              org.json.JSONObject data = new org.json.JSONObject("{}");
                              if (gc.getResponseCode() == 200) {
                                  java.io.BufferedReader br = new java.io.BufferedReader(
                                      new java.io.InputStreamReader(gc.getInputStream(), "UTF-8"));
                                  StringBuilder sb = new StringBuilder(); String line;
                                  while ((line = br.readLine()) != null) sb.append(line);
                                  data = new org.json.JSONObject(sb.toString());
                              }
                              gc.disconnect();
                              if (!data.has("historial")) data.put("historial", new org.json.JSONObject());
                              if (!data.has("horasTrabajadas")) data.put("horasTrabajadas", 0.0);
                              org.json.JSONObject hist = data.getJSONObject("historial");
                              if (hist.has(regId)) {
                                  new Handler(Looper.getMainLooper()).post(() ->
                                      Toast.makeText(app, "⚠️ Ya hay un registro para hoy", Toast.LENGTH_LONG).show());
                                  pr.finish(); return;
                              }
                              // Calculate nocturnal hours (22:00–06:00 range)
                              int startMin = Integer.parseInt(p1[0]) * 60 + Integer.parseInt(p1[1]);
                              int endMin   = Integer.parseInt(p2[0]) * 60 + Integer.parseInt(p2[1]);
                              if (endMin <= startMin) endMin += 1440;
                              int noctStart = 22 * 60, noctEnd = 6 * 60 + 1440;
                              int overlapStart = Math.max(startMin, noctStart);
                              int overlapEnd   = Math.min(endMin, noctEnd);
                              double horasNoct = (overlapEnd > overlapStart)
                                  ? Math.round((overlapEnd - overlapStart) / 6.0) / 10.0 : 0.0;
                              boolean esNoche  = horasNoct > 0;
                              double total = Math.round((data.getDouble("horasTrabajadas") + horas) * 10) / 10.0;
                              data.put("horasTrabajadas", total);
                              org.json.JSONObject reg = new org.json.JSONObject();
                              reg.put("fecha", fechaES); reg.put("horas", horas);
                              reg.put("timestamp", System.currentTimeMillis());
                              reg.put("horaInicio", inicio); reg.put("horaFin", fin);
                              if (esNoche) { reg.put("esNoche", true); reg.put("horasNocturnas", horasNoct); }
                              hist.put(regId, reg);
                              // PATCH Drive file
                              byte[] body = data.toString().getBytes("UTF-8");
                              java.net.URL pUrl = new java.net.URL(
                                  "https://www.googleapis.com/upload/drive/v3/files/" + fileId + "?uploadType=media");
                              java.net.HttpURLConnection pc = (java.net.HttpURLConnection) pUrl.openConnection();
                              pc.setRequestMethod("PATCH");
                              pc.setRequestProperty("Authorization", "Bearer " + token);
                              pc.setRequestProperty("Content-Type", "application/json; charset=UTF-8");
                              pc.setDoOutput(true);
                              pc.getOutputStream().write(body);
                              final int code = pc.getResponseCode();
                              pc.disconnect();
                              ((NotificationManager) app.getSystemService(Context.NOTIFICATION_SERVICE)).cancel(1001);
                              if (code == 200 || code == 201) {
                                  app.getSharedPreferences(PREFS, Context.MODE_PRIVATE).edit()
                                      .putString("lastRegisteredDate", regId)
                                      .putString("pendingRefresh", "1")
                                      .apply();
                              }
                              new Handler(Looper.getMainLooper()).post(() ->
                                  Toast.makeText(app,
                                      (code == 200 || code == 201)
                                          ? "✅ " + horas + "h registradas (" + inicio + "–" + fin + ")"
                                          : "❌ Error al registrar (" + code + ")",
                                      Toast.LENGTH_LONG).show());
                          } catch (Exception e) {
                              new Handler(Looper.getMainLooper()).post(() ->
                                  Toast.makeText(app, "❌ " + e.getMessage(), Toast.LENGTH_LONG).show());
                          } finally { pr.finish(); }
                      }).start();
                  }
              }
          }
          JAVAEOF

