name: Build APK

on:
  push:
    branches: [main, claude/pwa-install-support-dXc0v]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: npm run build:www

      - name: Add Android platform
        run: npx cap add android

      - name: Patch variables.gradle — targetSdkVersion 34
        run: |
          VARS="android/variables.gradle"
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 34/' "$VARS"
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' "$VARS"

      - name: Patch AndroidManifest — permissions + intent filter localhost
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />|' "$MANIFEST"
          sed -i 's|</activity>|        <intent-filter>\n            <action android:name="android.intent.action.VIEW" />\n            <category android:name="android.intent.category.DEFAULT" />\n            <category android:name="android.intent.category.BROWSABLE" />\n            <data android:scheme="https" android:host="localhost" />\n        </intent-filter>\n    </activity>|' "$MANIFEST"

      - name: Patch MainActivity — handle OAuth callback + file downloads
        run: |
          cat > android/app/src/main/java/com/guillermorc/horasemt/MainActivity.java << 'JAVAEOF'
          package com.guillermorc.horasemt;

          import android.content.ContentValues;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.MediaStore;
          import android.webkit.JavascriptInterface;
          import android.widget.Toast;
          import com.getcapacitor.BridgeActivity;
          import java.io.OutputStream;

          public class MainActivity extends BridgeActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  handleOAuthIntent(getIntent());
                  setupJavascriptInterface();
              }

              @Override
              protected void onNewIntent(Intent intent) {
                  super.onNewIntent(intent);
                  setIntent(intent);
                  handleOAuthIntent(intent);
              }

              private void handleOAuthIntent(Intent intent) {
                  if (intent == null || getBridge() == null) return;
                  Uri data = intent.getData();
                  if (data == null) return;
                  String token = data.getQueryParameter("access_token");
                  if (token == null || token.isEmpty()) return;
                  String exp = data.getQueryParameter("expires_in");
                  String url = "https://localhost/?access_token=" + Uri.encode(token)
                      + (exp != null ? "&expires_in=" + exp : "");
                  getBridge().getWebView().post(() -> getBridge().getWebView().loadUrl(url));
              }

              private void setupJavascriptInterface() {
                  if (getBridge() == null || getBridge().getWebView() == null) return;
                  getBridge().getWebView().addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void saveFile(String content, String filename) {
                          final String fname = (filename != null && !filename.isEmpty())
                              ? filename : "horas-emt.json";
                          byte[] bytes;
                          try { bytes = content.getBytes("UTF-8"); }
                          catch (Exception e) { bytes = content.getBytes(); }
                          final byte[] data = bytes;
                          try {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                                  ContentValues v = new ContentValues();
                                  v.put(MediaStore.Downloads.DISPLAY_NAME, fname);
                                  v.put(MediaStore.Downloads.MIME_TYPE, "application/json");
                                  Uri uri = getContentResolver().insert(
                                      MediaStore.Downloads.EXTERNAL_CONTENT_URI, v);
                                  if (uri == null) return;
                                  try (OutputStream os = getContentResolver().openOutputStream(uri)) {
                                      if (os != null) os.write(data);
                                  }
                              } else {
                                  java.io.File f = new java.io.File(
                                      Environment.getExternalStoragePublicDirectory(
                                          Environment.DIRECTORY_DOWNLOADS), fname);
                                  try (java.io.FileOutputStream fos = new java.io.FileOutputStream(f)) {
                                      fos.write(data);
                                  }
                                  android.media.MediaScannerConnection.scanFile(
                                      MainActivity.this, new String[]{f.getAbsolutePath()}, null, null);
                              }
                              runOnUiThread(() -> Toast.makeText(MainActivity.this,
                                  "Guardado en Descargas: " + fname, Toast.LENGTH_LONG).show());
                          } catch (Exception e) {
                              runOnUiThread(() -> Toast.makeText(MainActivity.this,
                                  "Error al guardar", Toast.LENGTH_SHORT).show());
                          }
                      }
                  }, "AndroidBridge");
              }
          }
          JAVAEOF

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Patch BackgroundGeo service — stopWithTask
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add xmlns:tools if not already present
          sed -i 's|xmlns:android="http://schemas.android.com/apk/res/android"|xmlns:android="http://schemas.android.com/apk/res/android" xmlns:tools="http://schemas.android.com/tools"|' "$MANIFEST"
          # Declare service override so it stops when user swipes the app from recents
          sed -i 's|</application>|    <service android:name="com.equimaps.capacitorbackgroundgeolocation.BackgroundGeolocationService" android:stopWithTask="true" tools:node="merge"/>\n    </application>|' "$MANIFEST"

      - name: Set Android launcher icon
        run: |
          sudo apt-get install -y --no-install-recommends imagemagick
          SRC="icons/icon-512.png"
          RES="android/app/src/main/res"
          BG="#1565C0"
          # Legacy icons + adaptive foreground/background for every density
          # Adaptive canvas sizes: mdpi=108 hdpi=162 xhdpi=216 xxhdpi=324 xxxhdpi=432
          for entry in "mipmap-mdpi:48:108" "mipmap-hdpi:72:162" "mipmap-xhdpi:96:216" "mipmap-xxhdpi:144:324" "mipmap-xxxhdpi:192:432"; do
            dir="${entry%%:*}"; rest="${entry#*:}"; size="${rest%%:*}"; asize="${rest##*:}"
            # Legacy launcher icons (solid background)
            convert "$SRC" -background "$BG" -alpha remove -resize "${size}x${size}" "$RES/$dir/ic_launcher.png"
            convert "$SRC" -background "$BG" -alpha remove -resize "${size}x${size}" "$RES/$dir/ic_launcher_round.png"
            # Adaptive foreground: icon at 66 % of canvas, centered
            fgsize=$((asize * 2 / 3))
            convert -size ${asize}x${asize} "xc:${BG}" \
              \( "$SRC" -resize ${fgsize}x${fgsize} \) \
              -gravity center -composite "$RES/$dir/ic_launcher_foreground.png"
            # Adaptive background: solid color
            convert -size ${asize}x${asize} "xc:${BG}" "$RES/$dir/ic_launcher_background.png"
          done
          # Adaptive icon XML (Android 8+)
          mkdir -p "$RES/mipmap-anydpi-v26"
          cat > "$RES/mipmap-anydpi-v26/ic_launcher.xml" << 'ICONEOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@mipmap/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          ICONEOF
          cp "$RES/mipmap-anydpi-v26/ic_launcher.xml" "$RES/mipmap-anydpi-v26/ic_launcher_round.xml"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: horas-emt-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
